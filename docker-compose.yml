services:  
  mysql:
    image: mysql:8.0
    container_name: user_management_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: user_management_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user_management_user
      MYSQL_PASSWORD: password
    ports:
      - "3309:3306"
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data:
